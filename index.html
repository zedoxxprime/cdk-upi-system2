<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zedox - ChatGPT Plus UPI QR Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: 'Inter', Arial, sans-serif;
  background: #07070d;
  color: #eef0ff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  background-image: radial-gradient(ellipse 80% 50% at 30% 10%, rgba(108,92,231,0.08), transparent),
    radial-gradient(ellipse 60% 40% at 70% 80%, rgba(0,212,170,0.06), transparent);
}
.container{
  background: #0c0e1a;
  border: 1px solid #1e2340;
  border-radius: 18px;
  padding: 32px;
  max-width: 520px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.logo-row{
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 6px;
}
.logo{
  width: 44px;
  height: 44px;
  border-radius: 14px;
  background: linear-gradient(135deg, #6c5ce7, #00b894);
  display: grid;
  place-items: center;
  font-size: 20px;
  box-shadow: 0 0 20px rgba(108,92,231,0.3);
}
h1{
  font-size: 22px;
  font-weight: 800;
  background: linear-gradient(135deg, #fff, #a29bfe);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle{
  color: #7a84b0;
  font-size: 12px;
  margin-bottom: 24px;
}
label{
  display: block;
  color: #a5aecf;
  font-size: 12px;
  font-weight: 600;
  margin: 14px 0 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
textarea{
  width: 100%;
  height: 150px;
  padding: 14px;
  background: #0a0a15;
  border: 1px solid #1e2340;
  color: #fff;
  border-radius: 12px;
  font-family: 'SF Mono', Menlo, monospace;
  font-size: 13px;
  outline: none;
  resize: vertical;
  transition: border-color 0.2s;
}
textarea:focus{
  border-color: #6c5ce7;
  box-shadow: 0 0 0 3px rgba(108,92,231,0.15);
}
textarea::placeholder{color: #4a5080}
.btn{
  width: 100%;
  padding: 14px;
  margin-top: 16px;
  border: 0;
  border-radius: 12px;
  background: linear-gradient(135deg, #6c5ce7, #00b894);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(108,92,231,0.3);
}
.btn:hover{transform: translateY(-1px); box-shadow: 0 8px 30px rgba(108,92,231,0.4)}
.btn:disabled{opacity: 0.5; cursor: not-allowed; transform: none}
.status{
  margin-top: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 13px;
  display: none;
  line-height: 1.5;
}
.status.show{display: block}
.status.info{background: rgba(108,92,231,0.1); color: #a29bfe; border: 1px solid rgba(108,92,231,0.3)}
.status.ok{background: rgba(0,184,148,0.1); color: #55efc4; border: 1px solid rgba(0,184,148,0.3)}
.status.err{background: rgba(253,121,168,0.1); color: #fd79a8; border: 1px solid rgba(253,121,168,0.3)}
.qr-section{
  margin-top: 20px;
  text-align: center;
  display: none;
}
.qr-section.show{display: block}
.qr-box{
  background: #fff;
  display: inline-block;
  padding: 16px;
  border-radius: 18px;
  margin: 14px 0;
  box-shadow: 0 0 40px rgba(108,92,231,0.2);
}
.qr-box img{display: block; width: 260px; height: 260px}
.hint{color: #7a84b0; font-size: 11px; margin: 8px 0}
.url-box{
  background: #0a0a15;
  border: 1px solid #1e2340;
  border-radius: 10px;
  padding: 12px;
  word-break: break-all;
  font-family: monospace;
  font-size: 11px;
  color: #55efc4;
  margin: 10px 0;
  text-align: left;
}
.actions{display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 14px}
.act-btn{
  padding: 8px 18px;
  background: #11172a;
  border: 1px solid #1e2340;
  color: #eef0ff;
  border-radius: 999px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
}
.act-btn:hover{background: #1a1f35; border-color: #6c5ce7}
.spinner{
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin{to{transform: rotate(360deg)}}
.footer-row{
  margin-top: 20px;
  text-align: center;
  color: #4a5080;
  font-size: 11px;
}
.footer-row b{color: #a29bfe}
</style>
</head>
<body>
<div class="container">
  <div class="logo-row">
    <div class="logo">⚡</div>
    <div>
      <h1>Zedox UPI QR</h1>
    </div>
  </div>
  <p class="subtitle">ChatGPT Plus · ₹0 Free Trial · Stripe UPI Payment</p>

  <label>🔑 ChatGPT Session JSON</label>
  <textarea id="sessionInput" placeholder='Go to https://chatgpt.com/api/auth/session while logged in, copy ALL text, paste here...'></textarea>

  <button class="btn" id="genBtn" onclick="generateQR()">💳 Generate Stripe UPI QR — ₹0</button>

  <div class="status" id="status"></div>

  <div class="qr-section" id="qrSection">
    <h3 style="font-size:16px; margin-bottom:4px">📱 Scan to Pay ₹0</h3>
    <div class="qr-box" id="qrContainer"></div>
    <p class="hint">Use Google Pay / PhonePe / Paytm → Complete ₹0 mandate</p>
    <div class="url-box" id="urlDisplay"></div>
    <div class="actions">
      <button class="act-btn" onclick="copyURL()">📋 Copy Link</button>
      <button class="act-btn" onclick="openURL()">🌐 Open Stripe</button>
      <button class="act-btn" onclick="downloadQR()">📥 Download QR</button>
    </div>
  </div>

  <div class="footer-row">
    Powered by <b>Stripe</b> & <b>ChatGPT API</b>
  </div>
</div>

<script>
let stripeURL = '';
let qrInstance = null;

function showStatus(msg, type) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status show ' + type;
}

async function generateQR() {
  const raw = document.getElementById('sessionInput').value.trim();
  
  if (!raw) {
    showStatus('❌ Please paste your ChatGPT session JSON first', 'err');
    return;
  }

  let sessionData;
  try {
    sessionData = JSON.parse(raw);
  } catch(e) {
    showStatus('❌ Invalid JSON format. Go to chatgpt.com/api/auth/session and copy the ENTIRE page.', 'err');
    return;
  }

  const accessToken = sessionData.accessToken;
  if (!accessToken) {
    showStatus('❌ No accessToken found. Make sure you are logged into ChatGPT.', 'err');
    return;
  }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Calling ChatGPT API...';
  showStatus('⏳ Contacting ChatGPT server for Stripe UPI checkout URL...', 'info');

  try {
    const apiUrl = window.location.origin + '/api/generate';
    console.log('[Frontend] Calling API:', apiUrl);

    const res = await fetch(apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ accessToken: accessToken })
    });

    console.log('[Frontend] Response status:', res.status);

    const rawText = await res.text();
    console.log('[Frontend] Raw response:', rawText.substring(0, 400));

    let data;
    try {
      data = JSON.parse(rawText);
    } catch(e) {
      showStatus('❌ Server returned non-JSON response: ' + rawText.substring(0, 250), 'err');
      btn.disabled = false;
      btn.innerHTML = '💳 Generate Stripe UPI QR — ₹0';
      return;
    }

    console.log('[Frontend] Parsed data:', data);

    if (!data.success) {
      showStatus('❌ ' + (data.error || 'Failed to generate checkout URL. The account may already have Plus.'), 'err');
      if (data.chatgptResponse) {
        console.log('[Frontend] ChatGPT response:', data.chatgptResponse);
      }
      btn.disabled = false;
      btn.innerHTML = '💳 Generate Stripe UPI QR — ₹0';
      return;
    }

    stripeURL = data.url || data.checkoutUrl || data.stripeUrl;

    if (!stripeURL) {
      showStatus('❌ No URL received from server', 'err');
      btn.disabled = false;
      btn.innerHTML = '💳 Generate Stripe UPI QR — ₹0';
      return;
    }

    console.log('[Frontend] Got Stripe URL:', stripeURL);

    // Show QR section
    document.getElementById('qrSection').classList.add('show');
    document.getElementById('urlDisplay').textContent = stripeURL;

    // Generate QR code
    const container = document.getElementById('qrContainer');
    container.innerHTML = '';
    
    qrInstance = new QRCode(container, {
      text: stripeURL,
      width: 260,
      height: 260,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    showStatus('✅ Stripe UPI QR generated! Scan with any UPI app to complete ₹0 payment.', 'ok');
    
    // Scroll to QR
    document.getElementById('qrSection').scrollIntoView({ behavior: 'smooth' });

  } catch(err) {
    console.error('[Frontend] Error:', err);
    showStatus('❌ Network error: ' + err.message + '. Check if server is running.', 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '💳 Generate Stripe UPI QR — ₹0';
  }
}

function copyURL() {
  if (!stripeURL) return;
  navigator.clipboard.writeText(stripeURL).then(() => {
    showStatus('✅ Stripe URL copied to clipboard!', 'ok');
    setTimeout(() => document.getElementById('status').classList.remove('show'), 2000);
  }).catch(() => {
    showStatus('❌ Failed to copy. Please copy manually.', 'err');
  });
}

function openURL() {
  if (!stripeURL) return;
  window.open(stripeURL, '_blank');
}

function downloadQR() {
  const img = document.querySelector('#qrContainer img');
  if (!img) {
    showStatus('❌ No QR code to download', 'err');
    return;
  }
  const a = document.createElement('a');
  a.href = img.src;
  a.download = 'zedox-stripe-upi-qr.png';
  a.click();
  showStatus('✅ QR downloaded!', 'ok');
  setTimeout(() => document.getElementById('status').classList.remove('show'), 2000);
}
</script>
</body>
</html>
