<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zedox - ChatGPT Plus UPI QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Arial,sans-serif;
  background:#07070d;
  color:#eef0ff;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}
.card{
  background:#0c0e1a;
  border:1px solid #1e2340;
  border-radius:18px;
  padding:30px;
  max-width:500px;
  width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}
h1{
  font-size:22px;
  margin-bottom:4px;
  background:linear-gradient(135deg,#6c5ce7,#00b894);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.sub{color:#7a84b0;font-size:12px;margin-bottom:20px}
label{display:block;color:#a5aecf;font-size:12px;font-weight:600;margin:12px 0 6px}
textarea{
  width:100%;height:140px;padding:12px;
  background:#0a0a15;border:1px solid #1e2340;
  color:#fff;border-radius:12px;font-family:monospace;
  font-size:13px;outline:none;resize:vertical;
}
textarea:focus{border-color:#6c5ce7}
.btn{
  width:100%;padding:14px;margin-top:14px;
  border:0;border-radius:12px;
  background:linear-gradient(135deg,#6c5ce7,#00b894);
  color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;transition:0.2s;
}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.msg{
  margin-top:12px;padding:12px;border-radius:10px;
  font-size:13px;display:none;
}
.msg.show{display:block}
.msg.info{background:rgba(108,92,231,0.1);color:#a29bfe;border:1px solid rgba(108,92,231,0.3)}
.msg.ok{background:rgba(0,184,148,0.1);color:#55efc4;border:1px solid rgba(0,184,148,0.3)}
.msg.err{background:rgba(253,121,168,0.1);color:#fd79a8;border:1px solid rgba(253,121,168,0.3)}
.qr-wrap{display:none;text-align:center;margin-top:18px}
.qr-wrap.show{display:block}
.qr-box{background:#fff;display:inline-block;padding:14px;border-radius:16px;margin:12px 0}
.qr-box img{width:250px;height:250px;display:block}
.url{background:#0a0a15;border:1px solid #1e2340;border-radius:10px;padding:10px;word-break:break-all;font-family:monospace;font-size:11px;color:#55efc4;margin:10px 0}
.btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.sbtn{
  padding:8px 16px;background:#11172a;border:1px solid #1e2340;
  color:#fff;border-radius:999px;cursor:pointer;font-size:12px;
}
.sbtn:hover{background:#1a1f35;border-color:#6c5ce7}
.spin{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;
  border-radius:50%;animation:spin 0.6s linear infinite;
  vertical-align:middle;margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <h1>⚡ Zedox UPI QR</h1>
  <p class="sub">ChatGPT Plus · ₹0 Free Trial · Stripe UPI</p>

  <label>ChatGPT Session JSON</label>
  <textarea id="sessionInput" placeholder="Go to https://chatgpt.com/api/auth/session (logged in) → Copy ALL → Paste here"></textarea>

  <button class="btn" id="genBtn" onclick="generate()">💳 Generate Stripe UPI QR — ₹0</button>

  <div class="msg" id="msg"></div>

  <div class="qr-wrap" id="qrWrap">
    <h3 style="margin-bottom:6px">📱 Scan to Pay ₹0</h3>
    <div class="qr-box" id="qrContainer"></div>
    <p style="color:#7a84b0;font-size:11px">Google Pay / PhonePe / Paytm</p>
    <div class="url" id="urlBox"></div>
    <div class="btns">
      <button class="sbtn" onclick="copyURL()">📋 Copy</button>
      <button class="sbtn" onclick="openURL()">🌐 Open</button>
      <button class="sbtn" onclick="downloadQR()">📥 Download</button>
    </div>
  </div>
</div>

<script>
let stripeURL = '';
let qrInstance = null;

function show(msg, type) {
  const m = document.getElementById('msg');
  m.textContent = msg;
  m.className = 'msg show ' + type;
}

async function generate() {
  const raw = document.getElementById('sessionInput').value.trim();
  
  if (!raw) { show('❌ Paste session JSON first', 'err'); return; }

  let sessionData;
  try { sessionData = JSON.parse(raw); } 
  catch(e) { show('❌ Invalid JSON', 'err'); return; }

  const accessToken = sessionData.accessToken;
  if (!accessToken) { show('❌ No accessToken found', 'err'); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Generating...';
  show('⏳ Calling ChatGPT API...', 'info');

  try {
    // CALL YOUR VERCEL API
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ accessToken: accessToken })
    });

    const text = await res.text();
    
    let data;
    try { data = JSON.parse(text); } 
    catch(e) {
      show('❌ API returned: ' + text.substring(0, 200), 'err');
      btn.disabled = false;
      btn.innerHTML = '💳 Generate Stripe UPI QR — ₹0';
      return;
    }

    if (!data.success) {
      show('❌ ' + (data.error || 'Failed'), 'err');
      btn.disabled = false;
      btn.innerHTML = '💳 Generate Stripe UPI QR — ₹0';
      return;
    }

    stripeURL = data.url;

    // Show QR
    document.getElementById('qrWrap').classList.add('show');
    document.getElementById('urlBox').textContent = stripeURL;

    const container = document.getElementById('qrContainer');
    container.innerHTML = '';
    
    qrInstance = new QRCode(container, {
      text: stripeURL,
      width: 250,
      height: 250,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    show('✅ Stripe UPI QR ready!', 'ok');

  } catch(err) {
    show('❌ Error: ' + err.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '💳 Generate Stripe UPI QR — ₹0';
  }
}

function copyURL() {
  if (!stripeURL) return;
  navigator.clipboard.writeText(stripeURL);
  show('✅ Copied!', 'ok');
}

function openURL() {
  if (!stripeURL) return;
  window.open(stripeURL, '_blank');
}

function downloadQR() {
  const img = document.querySelector('#qrContainer img');
  if (!img) return;
  const a = document.createElement('a');
  a.href = img.src;
  a.download = 'zedox-stripe-upi-qr.png';
  a.click();
}
</script>
</body>
</html>
